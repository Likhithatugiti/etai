services:
  - type: web
    name: axon-industrial-intelligence
    env: python
    region: singapore
    plan: free
    buildCommand: pip install -r requirements.txt && python -m spacy download en_core_web_sm
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: LLM_PROVIDER
        value: groq
      - key: GROQ_MODEL
        value: llama3-70b-8192
      - key: GROQ_API_KEY
        sync: false
